<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="status-bar" class="fixed top-0 w-full text-[10px] text-center font-bold py-1 bg-blue-600 text-white z-50 uppercase">
    Initializing...
  </div>

  <div class="max-w-md mx-auto p-4 pt-10">
    
    <div id="view-search" class="view-div space-y-6">
      <div class="flex justify-between items-end">
        <h1 class="text-3xl font-black text-slate-800">Hanhaara</h1>
        <button onclick="downloadData()" class="text-[10px] bg-slate-200 px-3 py-1 rounded-full font-bold">FORCE DOWNLOAD</button>
      </div>

      <div class="bg-white p-6 rounded-3xl shadow-xl">
        <input type="text" id="searchInput" placeholder="Search ID or Name..." 
               class="w-full bg-slate-100 p-4 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-blue-500">
        <div id="results-area" class="mt-4 divide-y divide-slate-100 max-h-60 overflow-y-auto">
          </div>
      </div>
    </div>

    <div id="view-form" class="view-div hidden space-y-4">
      <button onclick="showView('search')" class="font-bold text-blue-600">← Back</button>
      <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-lg">
        <h2 id="disp-name" class="text-2xl font-black">--</h2>
        <p id="disp-id" class="opacity-70 text-xs font-mono uppercase tracking-widest">--</p>
      </div>

      <form id="mainForm" class="bg-white p-6 rounded-3xl shadow-xl space-y-4">
        <input type="hidden" name="id" id="val-id">
        <input type="hidden" name="name" id="val-name">
        
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Service</label>
          <select name="service" class="w-full bg-slate-100 p-4 rounded-xl outline-none">
            <option>Clinical Visit</option>
            <option>Nutrition Supplement</option>
            <option>Immunization</option>
          </select>
        </div>

        <textarea name="notes" placeholder="Notes..." class="w-full bg-slate-100 p-4 rounded-xl h-32 outline-none"></textarea>
        
        <button type="submit" class="w-full bg-blue-700 text-white font-black py-5 rounded-2xl">SAVE RECORD</button>
      </form>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzNnfeJaGanfNmuKP17zL-L3GKrN6G-7JjAifPKVNAbz2FDDP_ZIZwJkWrQ_wbo1UzQ/exec";

    // 1. SEARCH LOCAL DATABASE (Instant & Offline)
    document.getElementById('searchInput').oninput = async (e) => {
      const term = e.target.value.toUpperCase();
      const resultsArea = document.getElementById('results-area');
      if (term.length < 2) { resultsArea.innerHTML = ''; return; }

      const allClients = await localforage.getItem('master_data') || [];
      const matches = allClients.filter(c => 
        c.id.toString().includes(term) || c.name.toUpperCase().includes(term)
      );

      resultsArea.innerHTML = matches.map(c => `
        <div onclick="openClient('${c.id}', '${c.name}')" class="py-3 px-2 active:bg-slate-50 cursor-pointer">
          <p class="font-bold text-slate-700">${c.name}</p>
          <p class="text-[10px] text-slate-400 font-mono">${c.id}</p>
        </div>
      `).join('');

      if(matches.length === 0) {
        resultsArea.innerHTML = `<button onclick="openClient('${term}', '')" class="w-full text-left py-3 text-blue-600 font-bold">+ Register New: ${term}</button>`;
      }
    };

    // 2. DOWNLOAD DATA FOR OFFLINE USE
    async function downloadData() {
      if (!navigator.onLine) return;
      updateStatus("Downloading Records...", "bg-blue-500");
      try {
        const res = await fetch(`${GAS_URL}?action=download_all`);
        const data = await res.json();
        await localforage.setItem('master_data', data);
        updateStatus("Database Updated", "bg-green-600");
      } catch (e) {
        updateStatus("Download Failed", "bg-red-500");
      }
    }

    // 3. SYNC OFFLINE ENTRIES
    async function syncOffline() {
      const queue = await localforage.getItem('sync_queue') || [];
      if (queue.length === 0 || !navigator.onLine) return;

      updateStatus(`Syncing ${queue.length} Records...`, "bg-orange-500");
      for (let i = 0; i < queue.length; i++) {
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(queue[i]) });
      }
      await localforage.removeItem('sync_queue');
      await downloadData(); // Refresh local database after sync
    }

    function updateStatus(msg, color) {
      const bar = document.getElementById('status-bar');
      bar.innerText = msg;
      bar.className = `fixed top-0 w-full text-[10px] text-center font-bold py-1 text-white z-50 uppercase ${color}`;
    }

    function openClient(id, name) {
      if(!name) name = prompt("New Client Name:");
      if(!name) return;
      document.getElementById('val-id').value = id;
      document.getElementById('val-name').value = name;
      document.getElementById('disp-id').innerText = id;
      document.getElementById('disp-name').innerText = name;
      showView('form');
    }

    function showView(id) {
      document.querySelectorAll('.view-div').forEach(v => v.classList.add('hidden'));
      document.getElementById('view-' + id).classList.remove('hidden');
    }

    document.getElementById('mainForm').onsubmit = async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target).entries());
      
      const queue = await localforage.getItem('sync_queue') || [];
      queue.push(data);
      await localforage.setItem('sync_queue', queue);
      
      alert("Record Saved Locally");
      e.target.reset();
      showView('search');
      if(navigator.onLine) syncOffline();
    };

    // Initialization
    window.onload = () => {
      if (navigator.onLine) { syncOffline(); downloadData(); }
      else { updateStatus("Offline Mode - Local Data Only", "bg-orange-600"); }
    };
    window.addEventListener('online', syncOffline);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
